server {
    listen 8000;
    server_name localhost;

    root /app/static;
    index index.html;

    # Serve React Frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend agent (running on 8081)
    location /invocations {
        proxy_pass http://127.0.0.1:8081/invocations;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Also forward any other potential agent routes if needed
    location /ping {
        proxy_pass http://127.0.0.1:8081/ping;
    }
}
